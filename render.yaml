previews:
  generation: off

services:
  # 1. Key Value (Redis/Valkey) para controle de filas e cache
  - type: keyvalue
    name: httpsms-redis
    plan: free
    ipAllowList: [] # Apenas conexões internas privadas

  # 2. Go API (Web Service)
  - type: web
    name: httpsms-api
    runtime: docker
    dockerContext: api
    dockerfilePath: api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: APP_PORT
        value: "8000"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: USE_HTTP_LOGGER
        value: "true"
      - key: ENTITLEMENT_ENABLED
        value: "false"
      - key: EVENTS_QUEUE_TYPE
        value: emulator
      - key: EVENTS_QUEUE_NAME
        value: events-local
      - key: EVENTS_QUEUE_ENDPOINT
        value: http://localhost:8000/v1/events
      - key: EVENTS_QUEUE_USER_ID
        sync: false # Render irá perguntar no painel
      - key: EVENTS_QUEUE_USER_API_KEY
        sync: false # Render irá perguntar no painel
      - key: FIREBASE_CREDENTIALS
        sync: false # Render irá perguntar no painel
      - key: GCP_PROJECT_ID
        sync: false # Render irá perguntar no painel
      - key: DATABASE_URL
        fromDatabase:
          name: httpsms-db
          property: connectionString
      - key: DATABASE_URL_DEDICATED
        fromDatabase:
          name: httpsms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: httpsms-redis
          property: connectionString
      - key: SMTP_FROM_NAME
        value: httpSMS
      - key: SMTP_FROM_EMAIL
        sync: false # Render irá perguntar no painel
      - key: SMTP_USERNAME
        sync: false # Render irá perguntar no painel
      - key: SMTP_PASSWORD
        sync: false # Render irá perguntar no painel
      - key: SMTP_HOST
        value: smtp.mailtrap.io
      - key: SMTP_PORT
        value: "2525"
      - key: APP_URL
        sync: false # Render irá perguntar no painel (URL do Frontend httpsms-web)
      - key: APP_NAME
        value: httpSMS
      - key: SWAGGER_HOST
        sync: false # Render irá perguntar no painel (ex: api.seudominio.com)
      - key: CLOUDFLARE_TURNSTILE_SECRET_KEY
        sync: false # Render irá perguntar no painel

  # 3. Nuxt Web UI (Static Site) - 100% Gratuito no Render
  - type: web
    name: httpsms-web
    runtime: static
    rootDir: web
    buildCommand: "pnpm install && pnpm run generate"
    staticPublishPath: "./.output/public"
    envVars:
      - key: API_BASE_URL
        sync: false # Render irá perguntar no painel (URL da API httpsms-api)
      - key: APP_URL
        value: http://localhost:3000 # O Render atualiza isso dinamicamente ou você pode usar o domínio padrão
      - key: APP_NAME
        value: httpSMS
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: CLOUDFLARE_TURNSTILE_SITE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # 4. Banco de dados PostgreSQL gerenciado pelo Render
  - name: httpsms-db
    databaseName: httpsms
    user: dbusername
    plan: free
