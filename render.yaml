previews:
  generation: off

services:
  # 1. Key Value (Redis/Valkey) para controle de filas e cache
  - type: keyvalue
    name: httpsms-redis
    plan: free
    ipAllowList: [] # Apenas conexões internas privadas

  # 2. Go API (Web Service) - 100% Funcional e Remoto com Autenticação de API Key
  - type: web
    name: httpsms-api
    runtime: docker
    dockerContext: api
    dockerfilePath: api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: APP_PORT
        value: "8000"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: USE_HTTP_LOGGER
        value: "true"
      - key: ENTITLEMENT_ENABLED
        value: "false"
      - key: EVENTS_QUEUE_TYPE
        value: emulator
      - key: EVENTS_QUEUE_NAME
        value: events-local
      - key: EVENTS_QUEUE_ENDPOINT
        value: http://localhost:8000/v1/events
      - key: EVENTS_QUEUE_USER_ID
        value: system-user-id
      - key: EVENTS_QUEUE_USER_API_KEY
        value: system-user-api-key
